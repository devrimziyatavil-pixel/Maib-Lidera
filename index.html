<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maib LIDERA — Women's Digital Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

    ::-webkit-scrollbar-thumb:hover { background: rgba(108,194,74,0.4); }

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

const C = {

  offWhite:"#F8FAF7",grayLight:"#F0F2EE",grayMid:"#94A3B8",grayText:"#64748B",
  text:"#1E293B",gold:"#FFB800",coral:"#FF6B6B",sky:"#4ECDC4",purple:"#A06CD5",
  lightGreen:"#E8F5E3",pink:"#E84393",teal:"#0D9488",

const I={
  finance:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>,
  book:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2zM22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>,
  cart:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>,
  users:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>,
  arrow:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  check:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>,
  star:<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
  search:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  bell:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>,
  pin:<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  heart:<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" opacity="0.9"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>,
  trendUp:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
  alertCircle:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
  file:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
  layers:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
  video:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>,
  play:<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
  shield:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  phone:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>,
  pos:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M8 21V7M16 21V7M2 12h20"/></svg>,
  globe:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>,
  award:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>,
  chart:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>,
  leaf:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.17 22l1-2A17 17 0 0021 2c0 0-2.18 4.58-4 6z"/></svg>,
  truck:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
  building:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><rect x="4" y="2" width="16" height="20"/><line x1="9" y1="6" x2="9.01" y2="6"/><line x1="15" y1="6" x2="15.01" y2="6"/><path d="M9 22V18h6v4"/></svg>,
  credit:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>,
  mail:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg>,
  briefcase:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>,
  heartPulse:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M20.42 4.58a5.4 5.4 0 00-7.65 0l-.77.78-.77-.78a5.4 5.4 0 00-7.65 7.65l.78.77L12 20.65l7.65-7.65.77-.77a5.4 5.4 0 000-7.65z"/><path d="M3.5 12h4l2-3 3 6 2-3h5.5"/></svg>,
  zap:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  coffee:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>,
};

const CAMPAIGN_URL="https://www.maib.md/en/persoane-juridice/noutati/maib-consolideaza-initiativa-de-sustinere-a-antreprenoriatului-feminin-prin-campania-femei-care-conduc";

const Logo=({s=28})=>(<div style={{display:"flex",alignItems:"baseline",gap:s>24?8:5}}><span style={{fontFamily:"'DM Sans',sans-serif",fontWeight:800,fontSize:s,color:C.maibGreen,letterSpacing:-1}}>Maib</span><span style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:s*0.85,color:C.white,letterSpacing:3,textTransform:"uppercase"}}>LIDERA</span></div>);
const Pill=({children,active,color,onClick})=>(<button onClick={onClick} style={{padding:"9px 18px",borderRadius:50,border:active?"none":`1px solid ${C.white}15`,background:active?(color||C.maibGreen):"transparent",color:active?C.white:C.grayMid,fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:active?700:500,cursor:"pointer",transition:"all 0.2s",whiteSpace:"nowrap"}}>{children}</button>);
const Btn=({children,bg,color,onClick,full})=>(<button onClick={onClick} style={{padding:"14px 28px",background:bg||C.maibGreen,color:color||C.dark,border:"none",borderRadius:50,fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:700,cursor:"pointer",transition:"all 0.2s",width:full?"100%":"auto",display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onMouseEnter={e=>e.target.style.opacity="0.88"} onMouseLeave={e=>e.target.style.opacity="1"}>{children}</button>);
const SectionLabel=({color,text})=>(<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><div style={{width:32,height:2,background:color}}/><span style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:600,letterSpacing:3,textTransform:"uppercase",color}}>{text}</span></div>);
const LiveTag=()=>(<span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 7px",borderRadius:50,background:"#6CC24A18",fontFamily:"'DM Sans',sans-serif",fontSize:8,fontWeight:700,color:C.maibGreen,whiteSpace:"nowrap"}}>● Live</span>);
const CoTag=()=>(<span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 7px",borderRadius:50,background:"#FFB80018",fontFamily:"'DM Sans',sans-serif",fontSize:8,fontWeight:700,color:C.gold,whiteSpace:"nowrap"}}>★ Co-created</span>);
const Tags=({live,co})=>(<span style={{display:"inline-flex",gap:4,marginLeft:6}}>{live&&<LiveTag/>}{co&&<CoTag/>}</span>);

// ═══════════════════════════════════════════
// HERO
// ═══════════════════════════════════════════
function Hero({nav}){
  const[a,setA]=useState(false);
  useEffect(()=>{setTimeout(()=>setA(true),100);},[]);
  const tr=(d,extra="")=>`all 0.8s ease ${d}s ${extra}`;
  const vis=d=>({opacity:a?1:0,transform:a?"translateY(0)":"translateY(20px)",transition:tr(d)});
  return(
  <section style={{background:`linear-gradient(135deg,${C.deep} 0%,${C.dark} 50%,#0d2818 100%)`,minHeight:"100vh",display:"flex",alignItems:"center",position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:-120,right:-120,width:400,height:400,borderRadius:"50%",background:`radial-gradient(circle,${C.maibGreen}12,transparent 70%)`}}/>
    <div style={{position:"absolute",bottom:-80,left:-80,width:300,height:300,borderRadius:"50%",background:`radial-gradient(circle,${C.sky}08,transparent 70%)`}}/>
    <div style={{position:"absolute",inset:0,backgroundImage:`linear-gradient(${C.maibGreen}06 1px,transparent 1px),linear-gradient(90deg,${C.maibGreen}06 1px,transparent 1px)`,backgroundSize:"60px 60px"}}/>
    <div style={{maxWidth:1200,margin:"0 auto",padding:"120px 24px 80px",position:"relative",zIndex:2,width:"100%"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:24,...vis(0)}}>
        <div style={{width:40,height:2,background:C.maibGreen}}/><span style={{color:C.maibGreen,fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:600,letterSpacing:3,textTransform:"uppercase"}}>Where women entrepreneurs grow</span>
      </div>
      <h1 style={{fontFamily:"'DM Sans',sans-serif",fontSize:"clamp(34px,5vw,64px)",fontWeight:800,color:C.white,lineHeight:1.08,maxWidth:820,margin:"0 0 20px",...vis(0.15)}}>
        The capital to <span style={{color:C.maibGreen}}>start</span>,<br/>the knowledge to <span style={{color:C.gold}}>grow</span>,<br/>the connections to <span style={{color:C.sky}}>scale</span>.
      </h1>
      <p style={{fontFamily:"'DM Sans',sans-serif",fontSize:17,color:C.grayMid,maxWidth:540,lineHeight:1.7,margin:"0 0 40px",...vis(0.3)}}>
        Moldova's first integrated platform for women-led businesses — combining tailored financing, business education, and market access under one digital roof. Powered by Maib.
      </p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,maxWidth:700,...vis(0.45)}}>
        {[{k:"finance",icon:"💳",label:"Explore Products",sub:"Loans, savings, cards tailored for you",c:C.maibGreen},{k:"academy",icon:"🚀",label:"Enter the Growth Hub",sub:"Experiment, learn, build & grow",c:C.gold},{k:"network",icon:"🏪",label:"Discover Network",sub:"Connect, trade & grow together",c:C.sky}].map((cta,i)=>(
          <div key={i} onClick={()=>nav(cta.k)} style={{background:`${cta.c}15`,borderRadius:16,padding:"20px 18px",cursor:"pointer",border:`1px solid ${cta.c}25`,transition:"all 0.3s",backdropFilter:"blur(8px)"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-4px)";e.currentTarget.style.boxShadow=`0 12px 30px ${cta.c}20`;}} onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="none";}}>
            <div style={{fontSize:28,marginBottom:10}}>{cta.icon}</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:700,color:C.white,marginBottom:4}}>{cta.label}</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:`${C.white}60`,lineHeight:1.5}}>{cta.sub}</div>
            <div style={{marginTop:10,color:cta.c}}>{I.arrow}</div>
          </div>
        ))}
      </div>
      {/* Femei care conduc banner */}
      <a href={CAMPAIGN_URL} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",display:"block",marginTop:56,borderRadius:20,overflow:"hidden",background:`linear-gradient(135deg, #6B1D50 0%, #A83279 40%, #D63384 70%, #E84393 100%)`,...vis(0.6),cursor:"pointer",position:"relative"}}>
        <div style={{position:"absolute",top:-60,right:-40,width:220,height:220,borderRadius:"50%",background:"rgba(255,255,255,0.06)"}}/>
        <div style={{position:"absolute",right:30,top:16,fontSize:56,opacity:0.1,transform:"rotate(12deg)"}}>✿</div>
        <div style={{padding:"32px 40px",display:"grid",gridTemplateColumns:"1fr auto",gap:32,alignItems:"center",position:"relative",zIndex:2}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><span style={{color:"#FFD4E0"}}>{I.heart}</span><span style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700,letterSpacing:2.5,textTransform:"uppercase",color:"#FFD4E0"}}>Maib Campaign · „Femei care conduc"</span></div>
            <h3 style={{fontFamily:"'DM Sans',sans-serif",fontSize:26,fontWeight:800,color:C.white,margin:"0 0 8px",lineHeight:1.2}}>Women who lead businesses.<br/>Maib leads with them.</h3>
            <p style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"rgba(255,255,255,0.75)",lineHeight:1.7,margin:"0 0 16px",maxWidth:440}}>Business financing in MDL with a fixed rate of 8.88%/year. Plus a free Visa/Mastercard Business debit card for the first year.</p>
            <div style={{display:"flex",gap:24,marginBottom:16}}>
              {[{v:"8.88%",l:"Fixed annual rate"},{v:"Free",l:"Business card, 1st year"},{v:"Mar 31",l:"Apply by deadline"}].map((d,i)=>(<div key={i}><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:24,fontWeight:800,color:C.white}}>{d.v}</div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"rgba(255,255,255,0.55)"}}>{d.l}</div></div>))}
            </div>
            <div style={{display:"inline-flex",padding:"12px 24px",background:C.white,color:"#A83279",borderRadius:50,fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,gap:6,alignItems:"center"}}>Learn More & Apply {I.arrow}</div>
          </div>
          <div style={{width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid rgba(255,255,255,0.12)"}}><div><div style={{fontSize:40,marginBottom:2}}>👩‍💼</div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.7)"}}>Tu conduci.</div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:800,color:C.white}}>Maib LIDERA.</div></div></div>
        </div>
      </a>
    </div>
  </section>);
}

// PILLARS
// ═══════════════════════════════════════════
function Pillars({nav}){
  const pillars=[
    {k:"finance",icon:I.finance,c:C.maibGreen,t:"Access to Finance",d:"Start Package, startup loans, overnight facility, partnership loans — with ODA guarantee fast-track and cash-flow credit assessment.",feats:["LIDERA Start Package","Startup Loan for Women","Overnight Facility","Partnership Loans","Smart Eligibility Checker","Financial Command Center"]},
    {k:"academy",icon:I.book,c:C.gold,t:"Access to Knowledge",d:"Where ideas meet execution — courses, consultancy, mentoring, hackathons, and hands-on experiments to accelerate your business.",feats:["LIDERA Growth Hub Programs & Freelancer Track","Consultancy Package","Mentoring Marketplace","Financial Literacy Hub","Expert Webinars","LIDERA Hackathon"]},
    {k:"network",icon:I.cart,c:C.sky,t:"LIDERA Network",d:"Connect with peers, find mentors, trade with women-owned businesses — community and marketplace under one roof.",feats:["Connect: Forums, Summit, Hackathon, Peer Circles","Trade: Business Directory & Virtual Trade Fair","Supply Chain Finance & Export Toolkit","Success Stories & Business Lunch Series"]},
  ];
  return(
  <section style={{background:C.offWhite,padding:"96px 24px"}}>
    <div style={{maxWidth:1200,margin:"0 auto"}}>
      <div style={{textAlign:"center",marginBottom:56}}>
        <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:600,letterSpacing:3,textTransform:"uppercase",color:C.maibGreen}}>Three Pillars</span>
        <h2 style={{fontFamily:"'DM Sans',sans-serif",fontSize:"clamp(26px,4vw,42px)",fontWeight:800,color:C.text,margin:"10px 0 0"}}>One Ecosystem, Complete Support</h2>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:20}}>
        {pillars.map((p,i)=>(
          <div key={i} onClick={()=>nav(p.k)} style={{background:C.white,borderRadius:20,padding:32,cursor:"pointer",border:"1px solid #e8ebe5",position:"relative",overflow:"hidden",transition:"all 0.3s"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-5px)";e.currentTarget.style.boxShadow=`0 16px 40px ${p.c}12`;}} onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="none";}}>
            <div style={{position:"absolute",top:-30,right:-30,width:120,height:120,borderRadius:"50%",background:`${p.c}08`}}/>
            <div style={{width:52,height:52,borderRadius:14,background:`${p.c}10`,display:"flex",alignItems:"center",justifyContent:"center",color:p.c,marginBottom:18}}>{p.icon}</div>
            <h3 style={{fontFamily:"'DM Sans',sans-serif",fontSize:20,fontWeight:700,color:C.text,margin:"0 0 10px"}}>{p.t}</h3>

        <div style={{display:"flex",alignItems:"center",gap:10}}><button style={{width:32,height:32,borderRadius:8,border:`1px solid ${C.white}12`,background:"transparent",color:`${C.white}60`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>{I.bell}</button><button style={{padding:"7px 18px",background:C.maibGreen,color:C.dark,border:"none",borderRadius:50,fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:700,cursor:"pointer"}}>Sign In</button></div>

    {page==="network"&&<div style={{paddingTop:58}}><NetworkPage/></div>}

}

    const root = ReactDOM.createRoot(document.getElementById('root'));
